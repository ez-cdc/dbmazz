<svg viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 15px; font-weight: 600; fill: #1f2328; }
    .subtitle { font-size: 11px; fill: #656d76; }
    .label { font-size: 13px; fill: #1f2328; text-anchor: end; }
    .value { font-size: 12px; fill: #1f2328; font-weight: 600; }
    .bar-hero { fill: #1a7f37; }
    .bar-other { fill: #d1d5db; }
  </style>

  <text x="120" y="24" class="title">CDC Streaming Throughput (events/sec)</text>
  <text x="120" y="42" class="subtitle">PostgreSQL source &mdash; higher is better</text>

  <!-- dbmazz -->
  <text x="110" y="80" class="label">dbmazz</text>
  <rect x="120" y="64" width="400" height="22" rx="3" class="bar-hero"/>
  <text x="528" y="80" class="value">300,000+</text>

  <!-- Flink CDC -->
  <text x="110" y="114" class="label">Flink CDC</text>
  <rect x="120" y="98" width="26" height="22" rx="3" class="bar-other"/>
  <text x="154" y="114" class="value">19,500</text>

  <!-- Fivetran -->
  <text x="110" y="148" class="label">Fivetran</text>
  <rect x="120" y="132" width="21" height="22" rx="3" class="bar-other"/>
  <text x="149" y="148" class="value">16,000</text>

  <!-- Debezium -->
  <text x="110" y="182" class="label">Debezium</text>
  <rect x="120" y="166" width="13" height="22" rx="3" class="bar-other"/>
  <text x="141" y="182" class="value">10,000</text>

  <!-- Airbyte -->
  <text x="110" y="216" class="label">Airbyte</text>
  <rect x="120" y="200" width="8" height="22" rx="3" class="bar-other"/>
  <text x="136" y="216" class="value">3,300</text>

  <text x="120" y="250" class="subtitle">Sources: official docs, published benchmarks. See links below.</text>
</svg>
