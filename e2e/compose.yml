# =============================================================================
# EZ-CDC e2e test harness — docker compose
# =============================================================================
#
# This compose file is used by the ez-cdc CLI for quickstart, verify, and
# load. It is NOT the production deployment — production uses Packer AMIs
# built in infra-byoc.
#
# Profiles:
#
#   starrocks — PG source + StarRocks target + web UI
#   pg-target — PG source + PG target + web UI
#   snowflake — PG source + Snowflake cloud target (requires .env.snowflake)
#
# Preferred entry point is the `ez-cdc` CLI:
#
#   ez-cdc quickstart starrocks   # up + dashboard + interactive teardown
#   ez-cdc verify pg-target       # up + tests + down
#   ez-cdc up starrocks           # up only
#
# You can also call docker compose directly for debugging:
#
#   docker compose -f e2e/compose.yml --profile starrocks up -d
#
# Adding a new sink profile:
#   1. Add target service(s) with profiles: ["my-sink"]
#   2. Add dbmazz-my-sink service with SINK_TYPE + connection env vars
#   3. Add a TargetBackend in e2e/src/ez_cdc_e2e/backends/
#   4. Register the profile in e2e/src/ez_cdc_e2e/profiles.py
#   5. Run: ez-cdc verify my-sink

services:
  # ---------------------------------------------------------------------------
  # Source PostgreSQL — shared by all test profiles
  # WAL logical enabled, seed data: 500 orders + 1500 order_items
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    profiles: ["starrocks", "pg-target", "snowflake"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dbmazz
    ports:
      - "15432:5432"
    volumes:
      - ./fixtures/postgres-seed.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - dbmazz

  # ---------------------------------------------------------------------------
  # Profile: starrocks — PG source + StarRocks target + web UI
  # ---------------------------------------------------------------------------
  starrocks:
    image: starrocks/allin1-ubuntu:latest
    profiles: ["starrocks"]
    ports:
      - "8030:8030"
      - "9030:9030"
    volumes:
      - srdata:/data
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 9030 -u root -e 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 60s
    networks:
      - dbmazz

  starrocks-init:
    image: mysql:8.0
    profiles: ["starrocks"]
    volumes:
      - ./fixtures/starrocks-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      SR_HOST: starrocks
      SR_PORT: "9030"
      SR_DATABASE: dbmazz
    depends_on:
      starrocks:
        condition: service_healthy
    networks:
      - dbmazz

  # dbmazz for starrocks — preconfigured + dashboard UI on :8080
  dbmazz-starrocks:
    build:
      context: ..
      dockerfile: e2e/Dockerfile
      args:
        CARGO_FEATURES: "http-api"
    profiles: ["starrocks"]
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      # Source
      SOURCE_URL: "postgres://postgres:postgres@postgres:5432/dbmazz?replication=database"
      SOURCE_SLOT_NAME: "dbmazz_slot"
      SOURCE_PUBLICATION_NAME: "dbmazz_pub"
      TABLES: "orders,order_items"
      # Sink
      SINK_TYPE: "starrocks"
      SINK_URL: "http://starrocks:8030"
      SINK_PORT: "9030"
      SINK_DATABASE: "dbmazz"
      SINK_USER: "root"
      SINK_PASSWORD: ""
      # Pipeline
      FLUSH_SIZE: "2000"
      FLUSH_INTERVAL_MS: "2000"
      # Snapshot
      DO_SNAPSHOT: "true"
      SNAPSHOT_CHUNK_SIZE: "10000"
      SNAPSHOT_PARALLEL_WORKERS: "2"
      # UI + logging
      HTTP_API_PORT: "8080"
      GRPC_PORT: "50051"
      RUST_LOG: "info"
    depends_on:
      postgres:
        condition: service_healthy
      starrocks-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dbmazz

  # ---------------------------------------------------------------------------
  # Profile: pg-target — PG source + PG target + web UI
  # User configures connections from http://localhost:8080
  #
  # Connection details for the browser:
  #   Source: postgres://postgres:postgres@postgres:5432/dbmazz
  #   Target: postgres://postgres:postgres@postgres-target:5432/dbmazz_target
  # ---------------------------------------------------------------------------
  postgres-target:
    image: postgres:16
    profiles: ["pg-target"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dbmazz_target
    ports:
      - "25432:5432"
    volumes:
      - pg_target_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - dbmazz

  # dbmazz for pg-target — preconfigured + dashboard UI on :8080
  dbmazz-cdc:
    build:
      context: ..
      dockerfile: e2e/Dockerfile
      args:
        CARGO_FEATURES: "http-api"
    profiles: ["pg-target"]
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      # Source
      SOURCE_URL: "postgres://postgres:postgres@postgres:5432/dbmazz?replication=database"
      SOURCE_SLOT_NAME: "dbmazz_slot"
      SOURCE_PUBLICATION_NAME: "dbmazz_pub"
      TABLES: "orders,order_items"
      # Sink
      SINK_TYPE: "postgres"
      SINK_URL: "postgres://postgres:postgres@postgres-target:5432/dbmazz_target"
      SINK_DATABASE: "dbmazz_target"
      SINK_SCHEMA: "public"
      # Pipeline
      FLUSH_SIZE: "1000"
      FLUSH_INTERVAL_MS: "2000"
      # Snapshot
      DO_SNAPSHOT: "true"
      SNAPSHOT_CHUNK_SIZE: "10000"
      SNAPSHOT_PARALLEL_WORKERS: "2"
      # UI + logging
      HTTP_API_PORT: "8080"
      GRPC_PORT: "50051"
      RUST_LOG: "info"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-target:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dbmazz

  # ---------------------------------------------------------------------------
  # Profile: snowflake — PG source + Snowflake cloud target
  # Requires: e2e/.env.snowflake with Snowflake credentials
  #
  # Setup:
  #   cp e2e/.env.snowflake.example e2e/.env.snowflake
  #   # Fill in your Snowflake credentials
  #   ez-cdc quickstart snowflake   (or: ez-cdc verify snowflake)
  # ---------------------------------------------------------------------------
  dbmazz-snowflake:
    build:
      context: ..
      dockerfile: e2e/Dockerfile
      args:
        CARGO_FEATURES: "http-api"
    profiles: ["snowflake"]
    ports:
      - "8080:8080"
      - "50051:50051"
    env_file:
      - path: .env.snowflake
        required: true
    environment:
      # Source (hardcoded — same PG as other profiles)
      SOURCE_URL: "postgres://postgres:postgres@postgres:5432/dbmazz?replication=database"
      SOURCE_SLOT_NAME: "dbmazz_slot"
      SOURCE_PUBLICATION_NAME: "dbmazz_pub"
      TABLES: "orders,order_items"
      # Sink
      SINK_TYPE: "snowflake"
      # Pipeline
      FLUSH_SIZE: "${FLUSH_SIZE:-500}"
      FLUSH_INTERVAL_MS: "${FLUSH_INTERVAL_MS:-2000}"
      # Snapshot
      DO_SNAPSHOT: "true"
      SNAPSHOT_CHUNK_SIZE: "10000"
      SNAPSHOT_PARALLEL_WORKERS: "2"
      # UI + logging
      HTTP_API_PORT: "8080"
      GRPC_PORT: "50051"
      RUST_LOG: "${RUST_LOG:-info}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dbmazz

  # ---------------------------------------------------------------------------
  # Future profiles: add target + dbmazz service per sink type
  # ---------------------------------------------------------------------------
  # Profile: mongodb
  # Profile: s3

networks:
  dbmazz:
    driver: bridge

volumes:
  pgdata:
  srdata:
  pg_target_data:
