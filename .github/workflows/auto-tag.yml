name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate next version from conventional commits
        id: version
        run: |
          # Get latest semver tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Get commit subjects since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null)

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"
          echo ""

          # Determine bump type from conventional commits
          # Priority: major > minor > patch
          BUMP="none"
          while IFS= read -r msg; do
            # BREAKING CHANGE: type! or BREAKING CHANGE in body marker
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              BUMP="major"
            fi

            # feat → minor (unless already major)
            if echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi

            # fix, refactor, perf, etc → patch (unless already minor or major)
            if echo "$msg" | grep -qE '^(fix|refactor|perf|security)(\(.+\))?:'; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi

            # docs, test, chore, style, ci → patch (low priority changes)
            if echo "$msg" | grep -qE '^(docs|test|chore|style|ci|build)(\(.+\))?:'; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No conventional commits found, skipping tag"
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump type: $BUMP"
          echo "New tag: $NEW_TAG"
          echo "TAG=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "BUMP=$BUMP" >> "$GITHUB_OUTPUT"
          echo "SKIP=false" >> "$GITHUB_OUTPUT"

          # Build changelog for tag message
          CHANGELOG=$(git log "$LATEST_TAG"..HEAD --pretty=format:"- %s" 2>/dev/null)
          # Write multiline changelog to env file
          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.SKIP != 'true'
        env:
          NEW_TAG: ${{ steps.version.outputs.TAG }}
          BUMP: ${{ steps.version.outputs.BUMP }}
          CHANGELOG: ${{ steps.version.outputs.CHANGELOG }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "$NEW_TAG ($BUMP)

          $CHANGELOG"
          git push origin "$NEW_TAG"
          echo "Created and pushed tag: $NEW_TAG"

      - name: Summary
        if: steps.version.outputs.SKIP != 'true'
        run: |
          echo "## Auto Tag: ${{ steps.version.outputs.TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bump:** ${{ steps.version.outputs.BUMP }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Changelog" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.version.outputs.CHANGELOG }}" >> "$GITHUB_STEP_SUMMARY"
