name: Build and Release DBMazz

on:
  push:
    branches: [main]

env:
  COMPONENT: dbmazz
  S3_BUCKET: ez-cdc-releases
  GCS_BUCKET: ez-cdc-releases-gcp
  GHCR_IMAGE: ghcr.io/ez-cdc/dbmazz

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # ---------------------------------------------------------------------
  # Job 1: version
  # Calculates the next semver from conventional commits. All other jobs
  # consume these outputs. Skips the whole pipeline if no relevant commits.
  # ---------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.VERSION }}
      tag: ${{ steps.calc.outputs.TAG }}
      latest_tag: ${{ steps.calc.outputs.LATEST_TAG }}
      skip: ${{ steps.calc.outputs.SKIP }}
      changelog: ${{ steps.calc.outputs.CHANGELOG }}
      is_prerelease: ${{ steps.calc.outputs.IS_PRERELEASE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read version from Cargo.toml
        id: calc
        run: |
          set -euo pipefail

          # Source of truth: the `version = "X.Y.Z"` line in Cargo.toml.
          # A release fires iff this version differs from the latest tag
          # (and is strictly greater). Bumping is a manual, reviewable
          # action in the PR that intends to ship.
          VERSION=$(grep -E '^version = "' Cargo.toml | head -1 | sed -E 's/^version = "(.*)"$/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to parse version from Cargo.toml"
            exit 1
          fi
          NEW_TAG="v${VERSION}"
          echo "Cargo.toml version: $VERSION"

          # Find the latest tag (fetched from origin via fetch-tags: true
          # on the checkout step above). Used for changelog range, the
          # monotonicity guard, and unreleased-commit diagnostics.
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Tag-exists check against the remote (remote is the truth —
          # local refs can lag). If the tag already exists, no-op release:
          # emit a diagnostic so accumulated unreleased commits don't hide.
          if git ls-remote --exit-code --tags origin "refs/tags/$NEW_TAG" >/dev/null 2>&1; then
            COMMITS_SINCE=$(git log "$LATEST_TAG"..HEAD --oneline 2>/dev/null | wc -l | tr -d ' ')
            {
              echo "## Release skipped"
              echo ""
              echo "Tag \`$NEW_TAG\` already exists on \`origin\`."
              echo ""
              echo "**${COMMITS_SINCE} commit(s)** since \`$LATEST_TAG\` are not yet released. Bump \`Cargo.toml\` in a PR to cut the next release."
              echo ""
              echo "### Unreleased commits"
              git log "$LATEST_TAG"..HEAD --pretty=format:"- %s" 2>/dev/null || true
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Tag $NEW_TAG already exists, skipping release. $COMMITS_SINCE commit(s) unreleased."
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Monotonicity guard: reject backwards or sideways version moves.
          # Uses `sort -V` (version sort) to compare without parsing semver.
          if [ "$LATEST_TAG" != "v0.0.0" ]; then
            LATEST_VER="${LATEST_TAG#v}"
            if [ "$VERSION" = "$LATEST_VER" ]; then
              echo "::error::Cargo.toml version $VERSION equals the latest tag $LATEST_TAG. Bump the version to cut a release."
              exit 1
            fi
            HIGHER=$(printf '%s\n%s\n' "$LATEST_VER" "$VERSION" | sort -V | tail -1)
            if [ "$HIGHER" != "$VERSION" ]; then
              echo "::error::Cargo.toml version $VERSION is older than the latest tag $LATEST_TAG. Version must only move forward."
              exit 1
            fi
          fi

          # Pre-release detection: derived from the version string itself.
          # Examples that flip to prerelease: 1.7.0-rc.1, 2.0.0-beta.3,
          # 1.6.9-alpha, 1.6.9-pre.20260414. Pre-releases skip the mutable
          # latest/X.Y/X Docker tags in docker-publish.
          IS_PRERELEASE="false"
          if echo "$VERSION" | grep -qE -- '-(rc|alpha|beta|pre)(\.|$|[0-9])'; then
            IS_PRERELEASE="true"
          fi

          echo "Releasing $NEW_TAG (prerelease=$IS_PRERELEASE)"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "LATEST_TAG=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "SKIP=false" >> "$GITHUB_OUTPUT"
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            git log "$LATEST_TAG"..HEAD --pretty=format:"- %s" 2>/dev/null
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # Job 2: build-dbmazz
  # Compiles dbmazz for linux amd64 and arm64 (both musl static).
  # Uploads each binary as an artifact consumed by docker-publish and release.
  #
  # Runner notes:
  #   - amd64 uses ubuntu-latest (native)
  #   - arm64 uses ubuntu-24.04-arm (native GitHub-hosted ARM runner)
  #   - If ubuntu-24.04-arm is not available in the org, fallback is
  #     `cross` + QEMU on ubuntu-latest. Swap the matrix entry to:
  #        runner: ubuntu-latest
  #     and add a step that runs
  #        cargo install cross --git https://github.com/cross-rs/cross
  #        cross build --release --target aarch64-unknown-linux-musl
  #     Slower (~10 min extra) but works anywhere.
  # ---------------------------------------------------------------------
  build-dbmazz:
    needs: version
    if: needs.version.outputs.skip != 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            arch: amd64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler musl-tools pkg-config perl make jq
          # Note: libssl-dev is NOT needed because openssl-sys is vendored
          # and curl uses static-curl (see Cargo.toml). The whole dbmazz
          # binary is fully static with musl libc.

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build dbmazz
        env:
          CARGO_TERM_COLOR: always
        run: cargo build --release --locked --target ${{ matrix.target }} --verbose

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/dbmazz dbmazz-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dbmazz-linux-${{ matrix.arch }}
          path: dbmazz-linux-${{ matrix.arch }}
          retention-days: 1

  # ---------------------------------------------------------------------
  # Job 3: docker-publish
  # Builds the multi-arch Docker image from pre-compiled binaries and
  # pushes to GHCR. Runs only after both dbmazz architectures are built.
  # ---------------------------------------------------------------------
  docker-publish:
    needs: [version, build-dbmazz]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download dbmazz binaries
        uses: actions/download-artifact@v8
        with:
          pattern: dbmazz-linux-*
          merge-multiple: true

      - name: Verify binaries
        run: |
          ls -lh dbmazz-linux-amd64 dbmazz-linux-arm64
          file dbmazz-linux-amd64 dbmazz-linux-arm64
          # The Dockerfile runs `chmod +x` on them after COPY, no need here.

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # We split X.Y.Z into components so metadata-action can emit the
      # mutable X.Y and X tags. metadata-action's `type=semver` only
      # parses from git refs, but our version comes from a computed
      # output — so we pre-compute the parts here and use `type=raw`.
      - name: Split version into components
        id: verparts
        run: |
          VERSION=${{ needs.version.outputs.version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ steps.verparts.outputs.major_minor }},enable=${{ needs.version.outputs.is_prerelease == 'false' }}
            type=raw,value=${{ steps.verparts.outputs.major }},enable=${{ needs.version.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ needs.version.outputs.is_prerelease == 'false' }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.source=https://github.com/ez-cdc/dbmazz
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Elastic-2.0
            org.opencontainers.image.description=Real-time CDC daemon for PostgreSQL to StarRocks, PostgreSQL, and Snowflake

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Disable SLSA provenance and SBOM attestations. They are
          # enabled by default in build-push-action@v7 and published
          # as extra artifacts on the workflow run, which then break
          # the `release` job's Download all artifacts step because
          # their format is not a plain file the subsequent steps
          # expect. We can re-enable them later with a dedicated
          # sigstore step if we want signed release artifacts.
          provenance: false
          sbom: false

  # ---------------------------------------------------------------------
  # Job 4: release
  # Final job. Uploads enterprise binaries to S3 + GCS (unchanged path),
  # creates the git tag, and publishes a GitHub Release with all assets.
  # Runs only after every build and the docker publish succeeded.
  # ---------------------------------------------------------------------
  release:
    needs: [version, build-dbmazz, docker-publish]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # Explicit patterns instead of downloading *all* artifacts, so we
      # never pick up unexpected artifacts (e.g. SLSA attestations from
      # docker/build-push-action) that would fail the extract step.
      - name: Download dbmazz binaries
        uses: actions/download-artifact@v8
        with:
          pattern: dbmazz-linux-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dbmazz-linux-*

      - name: Calculate dbmazz checksums
        run: |
          sha256sum dbmazz-linux-amd64 > SHA256SUMS
          sha256sum dbmazz-linux-arm64 >> SHA256SUMS
          cat SHA256SUMS

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Upload versioned binaries to S3
        run: |
          VERSION=${{ needs.version.outputs.version }}
          aws s3 cp dbmazz-linux-amd64 \
            "s3://${{ env.S3_BUCKET }}/${{ env.COMPONENT }}/${VERSION}/dbmazz-linux-amd64"
          aws s3 cp dbmazz-linux-arm64 \
            "s3://${{ env.S3_BUCKET }}/${{ env.COMPONENT }}/${VERSION}/dbmazz-linux-arm64"
          aws s3 cp SHA256SUMS \
            "s3://${{ env.S3_BUCKET }}/${{ env.COMPONENT }}/${VERSION}/SHA256SUMS"

      - name: Update latest binaries in S3
        run: |
          VERSION=${{ needs.version.outputs.version }}
          aws s3 cp dbmazz-linux-amd64 \
            "s3://${{ env.S3_BUCKET }}/${{ env.COMPONENT }}/latest/dbmazz-linux-amd64"
          aws s3 cp dbmazz-linux-arm64 \
            "s3://${{ env.S3_BUCKET }}/${{ env.COMPONENT }}/latest/dbmazz-linux-arm64"
          echo "${VERSION}" > version.txt
          aws s3 cp version.txt \
            "s3://${{ env.S3_BUCKET }}/${{ env.COMPONENT }}/latest/VERSION"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/657615647135/locations/global/workloadIdentityPools/github-ci/providers/github
          service_account: github-ci@ez-cdc-platform.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload versioned binaries to GCS
        run: |
          VERSION=${{ needs.version.outputs.version }}
          gcloud storage cp dbmazz-linux-amd64 \
            "gs://${{ env.GCS_BUCKET }}/${{ env.COMPONENT }}/${VERSION}/dbmazz-linux-amd64"
          gcloud storage cp dbmazz-linux-arm64 \
            "gs://${{ env.GCS_BUCKET }}/${{ env.COMPONENT }}/${VERSION}/dbmazz-linux-arm64"
          gcloud storage cp SHA256SUMS \
            "gs://${{ env.GCS_BUCKET }}/${{ env.COMPONENT }}/${VERSION}/SHA256SUMS"

      - name: Update latest binaries in GCS
        run: |
          VERSION=${{ needs.version.outputs.version }}
          gcloud storage cp dbmazz-linux-amd64 \
            "gs://${{ env.GCS_BUCKET }}/${{ env.COMPONENT }}/latest/dbmazz-linux-amd64"
          gcloud storage cp dbmazz-linux-arm64 \
            "gs://${{ env.GCS_BUCKET }}/${{ env.COMPONENT }}/latest/dbmazz-linux-arm64"
          echo "${VERSION}" > version.txt
          gcloud storage cp version.txt \
            "gs://${{ env.GCS_BUCKET }}/${{ env.COMPONENT }}/latest/VERSION"

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          CHANGELOG: ${{ needs.version.outputs.changelog }}
          IS_PRERELEASE: ${{ needs.version.outputs.is_prerelease }}
        run: |
          # Atomic: `gh release create --target` creates the tag and the
          # GitHub Release in a single operation, and this is the last
          # mutation of the release job. If any earlier step fails, no tag
          # is created, and re-running the workflow on the same SHA
          # retries cleanly. S3/GCS uploads above are idempotent (cp
          # overwrites), so partial retries don't drift artifact state.
          #
          # CHANGELOG is passed via env (not direct template interpolation)
          # to avoid shell injection when commit messages contain quotes,
          # backticks, $(...), etc.
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "$CHANGELOG" \
            $PRERELEASE_FLAG \
            dbmazz-linux-amd64 \
            dbmazz-linux-arm64 \
            SHA256SUMS
          echo "Created tag and release: $TAG"

      - name: Summary
        env:
          # Pass version metadata and changelog via env, not direct
          # template interpolation, so commit messages containing
          # quotes, backticks, or command substitution do not execute
          # arbitrary shell code.
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
          LATEST_TAG: ${{ needs.version.outputs.latest_tag }}
          CHANGELOG: ${{ needs.version.outputs.changelog }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          {
            echo "## Release: ${COMPONENT} ${TAG}"
            echo ""
            echo "**Version:** ${VERSION}"
            echo "**Previous tag:** ${LATEST_TAG}"
            echo ""
            echo "### Enterprise binaries (S3 + GCS)"
            echo "- \`s3://${S3_BUCKET}/${COMPONENT}/${VERSION}/dbmazz-linux-{amd64,arm64}\`"
            echo "- \`gs://${GCS_BUCKET}/${COMPONENT}/${VERSION}/dbmazz-linux-{amd64,arm64}\`"
            echo ""
            echo "### Docker image (GHCR, multi-arch)"
            echo "- \`${GHCR_IMAGE}:${VERSION}\`"
            echo "- \`${GHCR_IMAGE}:latest\`"
            echo ""
            echo "### GitHub Release"
            echo "- ${SERVER_URL}/${REPOSITORY}/releases/tag/${TAG}"
            echo ""
            echo "### Changelog"
            echo "${CHANGELOG}"
          } >> "$GITHUB_STEP_SUMMARY"
