# =============================================================================
# dbmazz CDC Daemon — Self-Hosted Deployment
# =============================================================================
#
# Profiles:
#
#   quickstart — PG source + StarRocks target + web UI (configure from browser):
#     docker compose --profile quickstart up -d
#     Open http://localhost:8080
#
#   pg-target — PG source + PG target + web UI:
#     docker compose --profile pg-target up -d
#     Open http://localhost:8080
#     Source: postgres://postgres:postgres@postgres:5432/dbmazz
#     Target: postgres://postgres:postgres@postgres-target:5432/dbmazz_target
#
#   production — bring your own databases + web UI:
#     docker compose up -d
#     Open http://localhost:8080
#
# Adding a new sink profile:
#   1. Add target service(s) with profiles: ["my-sink"]
#   2. Add dbmazz-my-sink service with SINK_TYPE + connection env vars
#   3. Add verification to deploy/test-sink.sh
#   4. Run: docker compose --profile my-sink up -d

services:
  # ---------------------------------------------------------------------------
  # Source PostgreSQL — shared by all test profiles
  # WAL logical enabled, seed data: 500 orders + 1500 order_items
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    profiles: ["quickstart", "pg-target", "snowflake"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dbmazz
    ports:
      - "15432:5432"
    volumes:
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - dbmazz

  # ---------------------------------------------------------------------------
  # Profile: quickstart — StarRocks target + web UI
  # ---------------------------------------------------------------------------
  starrocks:
    image: starrocks/allin1-ubuntu:latest
    profiles: ["quickstart"]
    ports:
      - "8030:8030"
      - "9030:9030"
    volumes:
      - srdata:/data
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 9030 -u root -e 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 60s
    networks:
      - dbmazz

  starrocks-init:
    image: mysql:8.0
    profiles: ["quickstart"]
    volumes:
      - ./init/starrocks-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      SR_HOST: starrocks
      SR_PORT: "9030"
      SR_DATABASE: dbmazz
    depends_on:
      starrocks:
        condition: service_healthy
    networks:
      - dbmazz

  # dbmazz for quickstart — web UI, configure from browser
  dbmazz:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CARGO_FEATURES: "http-api"
    profiles: ["quickstart"]
    ports:
      - "${HTTP_API_PORT:-8080}:${HTTP_API_PORT:-8080}"
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
    env_file:
      - path: .env
        required: false
    environment:
      HTTP_API_PORT: "${HTTP_API_PORT:-8080}"
      GRPC_PORT: "${GRPC_PORT:-50051}"
      FLUSH_SIZE: "${FLUSH_SIZE:-2000}"
      FLUSH_INTERVAL_MS: "${FLUSH_INTERVAL_MS:-2000}"
      RUST_LOG: "${RUST_LOG:-info}"
    depends_on:
      postgres:
        condition: service_healthy
      starrocks-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_API_PORT:-8080}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dbmazz

  # ---------------------------------------------------------------------------
  # Profile: pg-target — PG source + PG target + web UI
  # User configures connections from http://localhost:8080
  #
  # Connection details for the browser:
  #   Source: postgres://postgres:postgres@postgres:5432/dbmazz
  #   Target: postgres://postgres:postgres@postgres-target:5432/dbmazz_target
  # ---------------------------------------------------------------------------
  postgres-target:
    image: postgres:16
    profiles: ["pg-target"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dbmazz_target
    ports:
      - "25432:5432"
    volumes:
      - pg_target_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - dbmazz

  # dbmazz for pg-target — preconfigured + dashboard UI on :8080
  dbmazz-cdc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CARGO_FEATURES: "http-api"
    profiles: ["pg-target"]
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      # Source
      SOURCE_URL: "postgres://postgres:postgres@postgres:5432/dbmazz?replication=database"
      SOURCE_SLOT_NAME: "dbmazz_slot"
      SOURCE_PUBLICATION_NAME: "dbmazz_pub"
      TABLES: "orders,order_items"
      # Sink
      SINK_TYPE: "postgres"
      SINK_URL: "postgres://postgres:postgres@postgres-target:5432/dbmazz_target"
      SINK_DATABASE: "dbmazz_target"
      SINK_SCHEMA: "public"
      # Pipeline
      FLUSH_SIZE: "1000"
      FLUSH_INTERVAL_MS: "2000"
      # Snapshot
      DO_SNAPSHOT: "true"
      SNAPSHOT_CHUNK_SIZE: "10000"
      SNAPSHOT_PARALLEL_WORKERS: "2"
      # UI + logging
      HTTP_API_PORT: "8080"
      GRPC_PORT: "50051"
      RUST_LOG: "info"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-target:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dbmazz

  # ---------------------------------------------------------------------------
  # Profile: snowflake — PG source + Snowflake cloud target
  # Requires: deploy/.env.snowflake with Snowflake credentials
  #
  # Setup:
  #   cp deploy/.env.snowflake.example deploy/.env.snowflake
  #   # Fill in your Snowflake credentials
  #   docker compose --profile snowflake up -d
  # ---------------------------------------------------------------------------
  dbmazz-snowflake:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CARGO_FEATURES: "http-api"
    profiles: ["snowflake"]
    ports:
      - "8080:8080"
      - "50051:50051"
    env_file:
      - path: .env.snowflake
        required: true
    environment:
      # Source (hardcoded — same PG as other profiles)
      SOURCE_URL: "postgres://postgres:postgres@postgres:5432/dbmazz?replication=database"
      SOURCE_SLOT_NAME: "dbmazz_slot"
      SOURCE_PUBLICATION_NAME: "dbmazz_pub"
      TABLES: "orders,order_items"
      # Sink
      SINK_TYPE: "snowflake"
      # Pipeline
      FLUSH_SIZE: "${FLUSH_SIZE:-500}"
      FLUSH_INTERVAL_MS: "${FLUSH_INTERVAL_MS:-2000}"
      # Snapshot
      DO_SNAPSHOT: "true"
      SNAPSHOT_CHUNK_SIZE: "10000"
      SNAPSHOT_PARALLEL_WORKERS: "2"
      # UI + logging
      HTTP_API_PORT: "8080"
      GRPC_PORT: "50051"
      RUST_LOG: "${RUST_LOG:-info}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dbmazz

  # ---------------------------------------------------------------------------
  # Future profiles: add target + dbmazz service per sink type
  # ---------------------------------------------------------------------------
  # Profile: mongodb
  # Profile: s3

networks:
  dbmazz:
    driver: bridge

volumes:
  pgdata:
  srdata:
  pg_target_data:
