# ez-cdc configuration
#
# This file is managed by `ez-cdc datasource` commands. You can edit it
# by hand if you prefer — `${VAR}` interpolation is supported for
# credentials.

# ─────────────────────────────────────────────────────────────────────
# Pipeline settings — applied to every replication job started by the CLI.
# ─────────────────────────────────────────────────────────────────────
settings:

  # Maximum events buffered per batch. Lower = lower latency, higher =
  # better throughput on fast sinks.
  flush_size: 10000

  # Maximum milliseconds a batch can accumulate before being flushed.
  flush_interval_ms: 5000

  # Run an initial backfill of the source tables on first start.
  do_snapshot: true

  # Rows per snapshot chunk. Larger chunks reduce overhead but use
  # more memory.
  snapshot_chunk_size: 50000

  # Reserved for future use. Currently unused.
  snapshot_parallel_workers: 2

  # Exit after the snapshot completes, without entering streaming mode.
  initial_snapshot_only: false

  # Log level. Accepts standard env_logger / tracing syntax:
  #   info, debug, warn, error, trace
  rust_log: info

# ─────────────────────────────────────────────────────────────────────
# Sources
# ─────────────────────────────────────────────────────────────────────
sources: {}

# Example PostgreSQL source — copy, uncomment, and edit:
#
# sources:
#   my-pg:
#     type: postgres
#
#     url: postgres://app_user:${PG_PASSWORD}@db.internal:5432/mydb?replication=database
#
#     tables:
#       - orders
#       - order_items
#       - customers
#
#     replication_slot: dbmazz_slot
#     publication: dbmazz_pub

# ─────────────────────────────────────────────────────────────────────
# Sinks
# ─────────────────────────────────────────────────────────────────────
sinks: {}

# ── Example: StarRocks sink ──────────────────────────────────────────
#
# sinks:
#   my-starrocks:
#     type: starrocks
#     url: http://starrocks-fe.internal:8030
#     mysql_port: 9030
#     database: analytics
#     user: root
#     password: ${SR_PASSWORD}

# ── Example: PostgreSQL target sink ──────────────────────────────────
#
# sinks:
#   my-pg-target:
#     type: postgres
#     url: postgres://etl_user:${PG_TARGET_PASSWORD}@warehouse.internal:5432/analytics
#     database: analytics
#     schema: public

# ── Example: Snowflake sink ──────────────────────────────────────────
#
# sinks:
#   my-snowflake:
#     type: snowflake
#     account: xy12345.us-east-1
#     warehouse: LOAD_WH
#     database: ANALYTICS
#     schema: PUBLIC
#     # role: LOAD_ROLE
#
#     # JWT key-pair auth (recommended). Generate with:
#     #   openssl genrsa 2048 | openssl pkcs8 -topk8 -v2 des3 -out snowflake.p8
#     # private_key_path: /etc/ez-cdc/snowflake.p8
#     # private_key_passphrase: ${SF_KEY_PASSPHRASE}
#
#     # Or username + password (not recommended for production).
#     user: LOAD_USER
#     password: ${SF_PASSWORD}
#
#     soft_delete: true
